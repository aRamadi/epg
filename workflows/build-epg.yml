name: Build EPG

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Pull EPG image
        run: docker pull ghcr.io/iptv-org/epg:master

      - name: Generate guide.xml
        run: |
          mkdir -p docs
          docker run --rm \
            -v "${{ github.workspace }}/channels.xml:/epg/public/channels.xml" \
            -v "${{ github.workspace }}/docs:/epg/public" \
            -e GZIP=true \
            ghcr.io/iptv-org/epg:master

      - name: Add .nojekyll
        run: touch docs/.nojekyll

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/guide.xml docs/guide.xml.gz docs/.nojekyll
          git commit -m "Update EPG" || echo "No changes to commit"
          git push
