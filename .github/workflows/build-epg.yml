name: Build EPG

on:
  workflow_dispatch:
  schedule:
    - cron: '13 7 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Generate guide.xml
        run: |
          mkdir -p docs
          docker run --rm \
            -v "${{ github.workspace }}/channels.xml:/epg/channels.xml:ro" \
            -v "${{ github.workspace }}/docs:/epg/docs" \
            --entrypoint sh \
            ghcr.io/iptv-org/epg:master \
            -lc 'npm run grab -- --channels=/epg/channels.xml --output=/epg/docs/guide.xml && gzip -kf /epg/docs/guide.xml'

      - name: Add .nojekyll
        run: touch docs/.nojekyll

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/guide.xml docs/guide.xml.gz docs/.nojekyll
          git commit -m "Update EPG" || echo "No changes to commit"
          git push
